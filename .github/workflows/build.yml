name: Build macOS binary
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v4
        with:
          go-version: '1.21'
      - name: Build darwin/amd64
        run: |
          GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o tikwm-darwin-amd64 ./tools/tikwm
      - name: Build linux (linux/amd64)
        run: |
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o tikwm-linux-amd64 ./tools/tikwm
      - uses: actions/upload-artifact@v4
        with:
          name: tikwm-macos
          path: tikwm-darwin-amd64
